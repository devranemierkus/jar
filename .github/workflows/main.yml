name: Build GirisEklentisi

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Unzip
        run: unzip -q *.zip -d build

      - name: Build
        run: mvn -B package --no-transfer-progress
        working-directory: build

      - name: Dogrulama
        run: unzip -l build/target/GirisEklentisi-*.jar | grep -E "plugin\.yml|\.class|bcrypt|querz|sqlite" | head -30

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: GirisEklentisi-${{ github.run_number }}
          path: build/target/GirisEklentisi-*.jar
          if-no-files-found: error
