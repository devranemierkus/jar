name: Build YucehanRP v16
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Unzip and Build
        run: |
          unzip -q YucehanRP-v16-fixed.zip
          cd YucehanRP-afk/YucehanRP-new/YucehanRP-final
          mvn clean package -B --no-transfer-progress
      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YucehanRP-v16
          path: YucehanRP-afk/YucehanRP-new/YucehanRP-final/target/*.jar
          retention-days: 90
      - name: Create Release (sadece tag push'ta)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: YucehanRP-afk/YucehanRP-new/YucehanRP-final/target/*.jar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
